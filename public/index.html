<!DOCTYPE html>
<html>
<head>
  <title>celestial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
    }
  </style>
</head>
<body>

<div id="chatbox"></div>

<div id="inputArea">
  <input id="input" placeholder="Talk to Nova..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value;

  const chatbox = document.getElementById("chatbox");

  chatbox.innerHTML += `<div class='msg user'>${msg}</div>`;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  chatbox.innerHTML += `<div class='msg bot'>${data.reply}</div>`;

  input.value = "";
}
</script>

</body>
</html>
